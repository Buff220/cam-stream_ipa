name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Unsigned IPA
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Clean and Archive Project
        run: |
          xcodebuild archive \
            -project Streamer.xcodeproj \
            -scheme Streamer \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Streamer.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/Streamer.xcarchive/Products/Applications/Streamer.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r Streamer.ipa Payload
          mv Streamer.ipa $GITHUB_WORKSPACE/Streamer.ipa

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Streamer-IPA
          path: Streamer.ipa
          if-no-files-found: error
